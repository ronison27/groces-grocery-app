<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Groces - Smart Grocery List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.2);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 20px 30px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .app-title {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .menu-btn:active {
            transform: scale(0.9);
        }

        .stats-header {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Input Section */
        .input-section {
            padding: 20px;
            background: white;
            border-bottom: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #itemInput {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        #itemInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        #quantityInput {
            width: 80px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .add-btn {
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .category-filter::-webkit-scrollbar {
            height: 4px;
        }

        .category-filter::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .category-btn {
            padding: 8px 16px;
            background: var(--light);
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* List Section */
        .list-section {
            padding: 20px;
            min-height: 300px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 14px;
            cursor: pointer;
            padding: 5px 10px;
        }

        #itemList {
            list-style: none;
        }

        .item {
            background: white;
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .item:active {
            transform: scale(0.98);
        }

        .item.completed {
            opacity: 0.6;
            background: var(--light);
        }

        .item-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .item-content {
            flex: 1;
        }

        .item-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .item.completed .item-name {
            text-decoration: line-through;
            color: var(--gray);
        }

        .item-meta {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: var(--gray);
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .item-category {
            background: var(--light);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .delete-btn:active {
            transform: scale(0.9);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 18px;
            font-weight: 500;
        }

        /* Category Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: flex-end;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 25px 25px 0 0;
            padding: 25px;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .category-option {
            padding: 20px;
            background: var(--light);
            border: 2px solid var(--border);
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-option:active {
            transform: scale(0.95);
        }

        .category-option.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .category-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .category-name {
            font-size: 13px;
            font-weight: 500;
        }

        /* Bottom Actions */
        .bottom-actions {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .action-btn.primary {
            background: var(--primary);
            color: white;
        }

        .action-btn.secondary {
            background: var(--light);
            color: var(--dark);
        }

        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <div class="app-title">
                    🛒 <span>Groces</span>
                </div>
                <button class="menu-btn" onclick="toggleMenu()">⋮</button>
            </div>
            <div class="stats-header">
                <div class="stat-card">
                    <span class="stat-number" id="totalItems">0</span>
                    <span class="stat-label">Total Items</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="checkedItems">0</span>
                    <span class="stat-label">In Cart</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="remainingItems">0</span>
                    <span class="stat-label">Remaining</span>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="itemInput" placeholder="Add grocery item..." autocomplete="off">
                <input type="number" id="quantityInput" placeholder="Qty" value="1" min="1">
                <button class="add-btn" onclick="addItem()">+</button>
            </div>
            <div class="category-filter">
                <button class="category-btn active" data-category="All" onclick="filterCategory('All')">All</button>
                <button class="category-btn" data-category="Fruits" onclick="filterCategory('Fruits')">🍎 Fruits</button>
                <button class="category-btn" data-category="Vegetables" onclick="filterCategory('Vegetables')">🥬 Veggies</button>
                <button class="category-btn" data-category="Dairy" onclick="filterCategory('Dairy')">🥛 Dairy</button>
                <button class="category-btn" data-category="Meat" onclick="filterCategory('Meat')">🥩 Meat</button>
                <button class="category-btn" data-category="Bakery" onclick="filterCategory('Bakery')">🍞 Bakery</button>
                <button class="category-btn" data-category="Other" onclick="filterCategory('Other')">📦 Other</button>
            </div>
        </div>

        <!-- List Section -->
        <div class="list-section">
            <div class="section-header">
                <h2 class="section-title">Shopping List</h2>
                <button class="clear-btn" onclick="clearCompleted()" id="clearBtn" style="display:none;">Clear Completed</button>
            </div>
            <ul id="itemList"></ul>
        </div>

        <!-- Bottom Actions -->
        <div class="bottom-actions">
            <button class="action-btn secondary" onclick="openCategoryModal()">📋 Set Category</button>
            <button class="action-btn primary" onclick="shareList()">📤 Share List</button>
        </div>

        <!-- Category Modal -->
        <div class="modal" id="categoryModal" onclick="closeCategoryModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-header">Select Category</div>
                <div class="category-grid">
                    <div class="category-option" onclick="selectCategory('Fruits')">
                        <div class="category-icon">🍎</div>
                        <div class="category-name">Fruits</div>
                    </div>
                    <div class="category-option" onclick="selectCategory('Vegetables')">
                        <div class="category-icon">🥬</div>
                        <div class="category-name">Vegetables</div>
                    </div>
                    <div class="category-option" onclick="selectCategory('Dairy')">
                        <div class="category-icon">🥛</div>
                        <div class="category-name">Dairy</div>
                    </div>
                    <div class="category-option" onclick="selectCategory('Meat')">
                        <div class="category-icon">🥩</div>
                        <div class="category-name">Meat</div>
                    </div>
                    <div class="category-option" onclick="selectCategory('Bakery')">
                        <div class="category-icon">🍞</div>
                        <div class="category-name">Bakery</div>
                    </div>
                    <div class="category-option" onclick="selectCategory('Snacks')">
                        <div class="category-icon">🍿</div>
                        <div class="category-name">Snacks</div>
                    </div>
                    <div class="category-option" onclick="selectCategory('Drinks')">
                        <div class="category-icon">🥤</div>
                        <div class="category-name">Drinks</div>
                    </div>
                    <div class="category-option" onclick="selectCategory('Frozen')">
                        <div class="category-icon">🧊</div>
                        <div class="category-name">Frozen</div>
                    </div>
                    <div class="category-option selected" onclick="selectCategory('Other')">
                        <div class="category-icon">📦</div>
                        <div class="category-name">Other</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let items = JSON.parse(localStorage.getItem('groceries')) || [];
        let currentCategory = 'Other';
        let filterActive = 'All';

        // Category Icons
        const categoryIcons = {
            'Fruits': '🍎',
            'Vegetables': '🥬',
            'Dairy': '🥛',
            'Meat': '🥩',
            'Bakery': '🍞',
            'Snacks': '🍿',
            'Drinks': '🥤',
            'Frozen': '🧊',
            'Other': '📦'
        };

        // Initialize
        renderItems();

        // Add Item
        function addItem() {
            const itemInput = document.getElementById('itemInput');
            const quantityInput = document.getElementById('quantityInput');
            const itemName = itemInput.value.trim();
            const quantity = parseInt(quantityInput.value) || 1;

            if (itemName === '') {
                itemInput.style.borderColor = 'var(--danger)';
                setTimeout(() => itemInput.style.borderColor = 'var(--border)', 500);
                vibrate(50);
                return;
            }

            const item = {
                id: Date.now(),
                name: itemName,
                quantity: quantity,
                category: currentCategory,
                completed: false,
                createdAt: new Date().toISOString()
            };

            items.unshift(item);
            saveItems();
            renderItems();
            
            itemInput.value = '';
            quantityInput.value = '1';
            itemInput.focus();
            vibrate(30);
        }

        // Render Items
        function renderItems() {
            const itemList = document.getElementById('itemList');
            itemList.innerHTML = '';

            let filteredItems = filterActive === 'All' 
                ? items 
                : items.filter(item => item.category === filterActive);

            if (filteredItems.length === 0) {
                itemList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🛒</div>
                        <div class="empty-text">Your grocery list is empty</div>
                        <div style="font-size: 14px; margin-top: 8px; opacity: 0.7;">Add items to get started!</div>
                    </div>
                `;
                document.getElementById('clearBtn').style.display = 'none';
            } else {
                const hasCompleted = filteredItems.some(item => item.completed);
                document.getElementById('clearBtn').style.display = hasCompleted ? 'block' : 'none';

                filteredItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = `item ${item.completed ? 'completed' : ''}`;
                    li.innerHTML = `
                        <input type="checkbox" class="item-checkbox" ${item.completed ? 'checked' : ''} onchange="toggleItem(${item.id})">
                        <div class="item-content">
                            <div class="item-name">${escapeHtml(item.name)}</div>
                            <div class="item-meta">
                                <span class="item-quantity">📊 Qty: ${item.quantity}</span>
                                <span class="item-category">${categoryIcons[item.category]} ${item.category}</span>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                    `;
                    itemList.appendChild(li);
                });
            }

            updateStats();
        }

        // Toggle Item
        function toggleItem(id) {
            items = items.map(item => 
                item.id === id ? { ...item, completed: !item.completed } : item
            );
            saveItems();
            renderItems();
            vibrate(30);
        }

        // Delete Item
        function deleteItem(id) {
            items = items.filter(item => item.id !== id);
            saveItems();
            renderItems();
            vibrate([50, 30]);
        }

        // Clear Completed
        function clearCompleted() {
            if (confirm('Remove all items in cart?')) {
                items = items.filter(item => !item.completed);
                saveItems();
                renderItems();
                vibrate(50);
            }
        }

        // Filter by Category
        function filterCategory(category) {
            filterActive = category;
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                }
            });

            renderItems();
            vibrate(20);
        }

        // Open Category Modal
        function openCategoryModal() {
            document.getElementById('categoryModal').classList.add('active');
            vibrate(30);
        }

        // Close Category Modal
        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('active');
        }

        // Select Category
        function selectCategory(category) {
            currentCategory = category;
            
            // Update selected category in modal
            document.querySelectorAll('.category-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            closeCategoryModal();
            document.getElementById('itemInput').focus();
            vibrate(30);
        }

        // Update Stats
        function updateStats() {
            const total = items.length;
            const checked = items.filter(item => item.completed).length;
            const remaining = total - checked;

            document.getElementById('totalItems').textContent = total;
            document.getElementById('checkedItems').textContent = checked;
            document.getElementById('remainingItems').textContent = remaining;
        }

        // Share List
        function shareList() {
            const uncheckedItems = items.filter(item => !item.completed);
            
            if (uncheckedItems.length === 0) {
                alert('📝 No items to share!');
                return;
            }

            let shareText = '🛒 My Grocery List:\n\n';
            uncheckedItems.forEach(item => {
                shareText += `${categoryIcons[item.category]} ${item.name} (${item.quantity})\n`;
            });
            shareText += `\n📊 Total Items: ${uncheckedItems.length}`;

            if (navigator.share) {
                navigator.share({
                    title: 'My Grocery List',
                    text: shareText
                }).catch(() => {});
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('✅ List copied to clipboard!');
                });
            }
            vibrate(50);
        }

        // Toggle Menu (placeholder)
        function toggleMenu() {
            const options = ['🗑️ Clear All', '📊 View Stats', '⚙️ Settings', '❌ Cancel'];
            const choice = prompt('Menu:\n0: Clear All\n1: View Stats\n2: Settings\n3: Cancel');
            
            if (choice === '0') {
                if (confirm('Delete all items?')) {
                    items = [];
                    saveItems();
                    renderItems();
                }
            } else if (choice === '1') {
                const total = items.length;
                const checked = items.filter(i => i.completed).length;
                alert(`📊 Statistics:\n\nTotal Items: ${total}\nIn Cart: ${checked}\nRemaining: ${total - checked}`);
            }
        }

        // Save Items
        function saveItems() {
            localStorage.setItem('groceries', JSON.stringify(items));
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Vibrate (if supported)
        function vibrate(pattern) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        // Keyboard shortcuts
        document.getElementById('itemInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });

        document.getElementById('quantityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });
    </script>
</body>
</html>
